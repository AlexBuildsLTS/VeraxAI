<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%">
  <style>
    /* Shapes and Colors */
    .server { fill: #B388FF; stroke: #0B2073; stroke-width: 8; stroke-linejoin: round; }
    .line { fill: none; stroke: #4DD0E1; stroke-width: 8; stroke-linejoin: round; stroke-linecap: round; }
    .circle-bg { fill: #FFFFFF; stroke: #0B2073; stroke-width: 8; }
    .x-mark { fill: none; stroke: #FF7597; stroke-width: 8; stroke-linecap: round; }
    .slot { fill: #FFFFFF; }
    .light { fill: #AEEA00; }
    
    /* Animations */
    .light { animation: blink 2s infinite alternate; }
    .anim-x { animation: pulse 2s infinite ease-in-out; }
    
    #x-left { transform-origin: 65px 100px; }
    #x-right { transform-origin: 175px 100px; }

    @keyframes blink {
      0% { opacity: 1; }
      100% { opacity: 0.2; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
  </style>

  <path class="line" d="M 85 75 L 65 75 L 65 150" />
  <path class="line" d="M 155 75 L 175 75 L 175 150" />

  <rect class="server" x="85" y="30" width="70" height="30" rx="6" />
  <rect class="server" x="85" y="60" width="70" height="30" rx="6" />
  <circle class="light" cx="100" cy="45" r="4.5" />
  <rect class="slot" x="115" y="41" width="25" height="8" rx="4" />
  <rect class="slot" x="100" y="71" width="25" height="8" rx="4" />
  <circle class="light" cx="140" cy="75" r="4.5" style="animation-delay: 0.5s;" />

  <rect class="server" x="30" y="140" width="70" height="30" rx="6" />
  <rect class="server" x="30" y="170" width="70" height="30" rx="6" />
  <circle class="light" cx="45" cy="155" r="4.5" style="animation-delay: 1s;" />
  <rect class="slot" x="60" y="151" width="25" height="8" rx="4" />
  <rect class="slot" x="45" y="181" width="25" height="8" rx="4" />
  <circle class="light" cx="85" cy="185" r="4.5" style="animation-delay: 1.5s;" />

  <rect class="server" x="140" y="140" width="70" height="30" rx="6" />
  <rect class="server" x="140" y="170" width="70" height="30" rx="6" />
  <circle class="light" cx="155" cy="155" r="4.5" style="animation-delay: 0.2s;" />
  <rect class="slot" x="170" y="151" width="25" height="8" rx="4" />
  <rect class="slot" x="155" y="181" width="25" height="8" rx="4" />
  <circle class="light" cx="195" cy="185" r="4.5" style="animation-delay: 0.7s;" />

  <circle class="circle-bg" cx="65" cy="100" r="22" />
  <path id="x-left" class="x-mark anim-x" d="M 55 90 L 75 110 M 75 90 L 55 110" />

  <circle class="circle-bg" cx="175" cy="100" r="22" />
  <path id="x-right" class="x-mark anim-x" d="M 165 90 L 185 110 M 185 90 L 165 110" style="animation-delay: -1s;" />
</svg>
